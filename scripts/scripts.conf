
# ============================================================================
# Scripts Configuration File
# ============================================================================
# Format: script_name.sh|run_as_root|description
# 
# Parameters:
#   - script_name.sh: Name of the script in the scripts/ folder
#   - run_as_root: true (requires sudo) or false (user-level)
#   - description: Human-readable description shown during execution
#
# Notes:
#   - Scripts execute in the order listed
#   - Lines starting with # are comments
#   - Scripts marked with (requires reboot) may trigger system reboot
#   - All scripts should be in the scripts/ folder
# ============================================================================

